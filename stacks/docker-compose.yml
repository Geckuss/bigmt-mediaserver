services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    network_mode: host  # jellyfin benefits from host mode for DLNA/auto-discovery
    volumes:
    - ${DATA}/media:/media
    - ${CONFIGS}/jellyfin-config:/config
    - ${CONFIGS}/jellyfin-cache:/cache
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
    extra_hosts:
      - host.docker.internal:host-gateway
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA}:/data
      - ${CONFIGS}/radarr-config:/config
      - ${CONFIGS}/extract-subs.sh:/scripts/extract-subs.sh:ro
      - ${CONFIGS}/install-ffmpeg.sh:/custom-cont-init.d/install-ffmpeg.sh:ro
    ports:
      - ${RADARR_PORT}:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA}:/data
      - ${CONFIGS}/sonarr-config:/config
      - ${CONFIGS}/extract-subs.sh:/scripts/extract-subs.sh:ro
      - ${CONFIGS}/install-ffmpeg.sh:/custom-cont-init.d/install-ffmpeg.sh:ro
    ports:
      - ${SONARR_PORT}:8989
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA}:/data
      - ${CONFIGS}/bazarr-config:/config
    ports:
      - ${BAZARR_PORT}:6767
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    ports:
      - 5055:5055
    volumes:
      - ${CONFIGS}/jellyseerr-config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIGS}/prowlarr-config:/config
    ports:
      - ${PROWLARR_PORT}:9696
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_WEBUI}
    volumes:
      - ${DATA}/downloads:/data/downloads
      - ${CONFIGS}/qbittorrent-config:/config
    ports:
      - ${QBITTORRENT_WEBUI}:8080
      - ${QBITTORRENT_PEER_TCP}:6881
      - ${QBITTORRENT_PEER_UDP}:6881/udp
    restart: unless-stopped

  handbrake:
    image: jlesage/handbrake
    container_name: handbrake
    ports:
      - ${HANDBRAKE_WEBUI}:5800
    volumes:
      - ${DATA}/downloads:/data/downloads
      - ${CONFIGS}/handbrake-config:/config:rw
      - ${DATA}/downloads:/storage:ro
      - ${DATA}/downloads/handbrake/input:/watch:rw
      - ${DATA}/downloads/handbrake/output:/output:rw
    restart: unless-stopped

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    network_mode: host
    environment:
      - TZ=${TZ}
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - WEB_PORT=${PIHOLE_WEBUI:-8089}
      - DNSMASQ_LISTENING=all
    volumes:
      - ${CONFIGS}/pihole/etc-pihole:/etc/pihole
      - ${CONFIGS}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - ${UPTIME_KUMA_PORT:-3001}:3001
    volumes:
      - ${CONFIGS}/uptime-kuma:/app/data
    restart: unless-stopped

  backrest:
    image: garethgeorge/backrest:latest
    container_name: backrest
    hostname: backrest
    ports:
      - ${BACKREST_PORT:-9898}:9898
    volumes:
      - ${CONFIGS}/backrest/data:/data
      - ${CONFIGS}/backrest/config:/config
      - ${CONFIGS}/backrest/cache:/cache
      # Sources (read-only)
      - ${CONFIGS}:/userdata/configs:ro
      - ${UPLOAD_LOCATION}:/userdata/immich-uploads:ro
      - ${DATA}/media:/userdata/media:ro
      # Backup drives (mount points exist even when unplugged)
      - /mnt/backup-5tb:/repos/primary
      - /mnt/backup-1tb:/repos/secondary
    environment:
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
    restart: unless-stopped
